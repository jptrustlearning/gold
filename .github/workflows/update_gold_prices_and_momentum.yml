name: Daily Gold Price + Momentum Score

on:
  schedule:
    # ทุกวันจันทร์-ศุกร์ เวลา 23:00 UTC วันก่อนหน้า (06:00 เวลาไทย)
    # อาทิตย์-พฤหัส UTC = จันทร์-ศุกร์ไทย
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # รัน manual ได้จาก Actions tab

jobs:
  update-prices-and-score:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GOLD_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy openpyxl

      # ════════════════════════════════════════════════════════════
      # STEP 1: ดึงราคาทองใหม่ + อัพเดท gold_prices.csv
      # ════════════════════════════════════════════════════════════
      - name: Fetch and update gold prices
        id: fetch_prices
        run: |
          python3 << 'EOF'
          import yfinance as yf
          import pandas as pd
          from datetime import datetime, timedelta
          import os

          SYMBOL = 'GC=F'
          CSV_FILE = 'gold_prices.csv'
          FALLBACK_START = '2020-01-01'

          # อ่านข้อมูลเดิม
          if os.path.exists(CSV_FILE):
              df_existing = pd.read_csv(CSV_FILE, encoding='utf-8-sig')
              df_existing.columns = ['Date','Open','High','Low','Close','Volume']
              df_existing['Date'] = pd.to_datetime(df_existing['Date'])
              last_date = df_existing['Date'].max()
              start_date = (last_date + timedelta(days=1)).strftime('%Y-%m-%d')
              print(f'📂 Existing: {len(df_existing)} rows, last: {last_date.date()}')
          else:
              df_existing = pd.DataFrame(columns=['Date','Open','High','Low','Close','Volume'])
              start_date = FALLBACK_START
              print(f'📂 No existing file — starting from {FALLBACK_START}')

          end_date = datetime.now().strftime('%Y-%m-%d')
          print(f'🔄 Fetching {SYMBOL}: {start_date} → {end_date}')

          # ดึงข้อมูลใหม่
          gold = yf.Ticker(SYMBOL)
          df_new = gold.history(start=start_date, end=end_date)

          if df_new.empty:
              print('ℹ️  No new data available — already up to date')
              with open('NO_NEW_DATA', 'w') as f:
                  f.write('true')
          else:
              df_new = df_new[['Open','High','Low','Close','Volume']].reset_index()
              df_new.rename(columns={'Date': 'Date_raw'}, inplace=True)
              if df_new['Date_raw'].dt.tz is not None:
                  df_new['Date_raw'] = df_new['Date_raw'].dt.tz_localize(None)
              df_new['Date'] = df_new['Date_raw']
              df_new = df_new[['Date','Open','High','Low','Close','Volume']]
              for col in ['Open','High','Low','Close']:
                  df_new[col] = df_new[col].round(1)
              df_new['Volume'] = df_new['Volume'].astype(int)
              new_count = len(df_new)
              print(f'📊 Fetched {new_count} new rows')

              # Merge
              df_all = pd.concat([df_existing, df_new], ignore_index=True)
              df_all['Date'] = pd.to_datetime(df_all['Date'])
              df_all = df_all.drop_duplicates(subset='Date', keep='last')
              df_all = df_all.sort_values('Date').reset_index(drop=True)

              # Save (Thai headers)
              df_out = df_all.copy()
              df_out['Date'] = df_out['Date'].dt.strftime('%Y-%m-%d')
              df_out.columns = ['วันที่','ราคาเปิด','ราคาสูงสุด','ราคาต่ำสุด','ราคาปิด','ปริมาณซื้อขาย']
              df_out.to_csv(CSV_FILE, index=False, encoding='utf-8-sig')

              latest_price = df_all['Close'].iloc[-1]
              latest_date = df_all['Date'].max().strftime('%Y-%m-%d')
              print(f'✅ Total: {len(df_all)} rows | Latest: ${latest_price:.1f} @ {latest_date}')

              with open('PRICE_COMMIT_INFO', 'w') as f:
                  f.write(f'+{new_count} rows | ${latest_price:.1f} @ {latest_date}')
          EOF

      # ════════════════════════════════════════════════════════════
      # STEP 2: รัน Momentum Scoring (ต่อทันทีไม่ว่าจะมีข้อมูลใหม่หรือไม่)
      # ════════════════════════════════════════════════════════════
      - name: Run Gold Momentum Scoring
        id: momentum
        run: |
          echo "🎯 Running momentum scoring..."
          python3 gold_momentum_v22.py
          echo "✅ Momentum scoring complete"

      # ════════════════════════════════════════════════════════════
      # STEP 3: Commit & Push ทุกอย่างพร้อมกัน
      # ════════════════════════════════════════════════════════════
      - name: Commit and push all outputs
        run: |
          git config user.email "jptrustlearning@users.noreply.github.com"
          git config user.name "JP Trust Learning"

          TIMESTAMP=$(date -u +"%d/%m/%Y %H:%M UTC")

          # Add price CSV (ถ้ามีข้อมูลใหม่)
          git add gold_prices.csv 2>/dev/null || true

          # Add momentum output files
          git add output_momentum_gold.csv 2>/dev/null || true
          git add output_momentum_gold_*.csv 2>/dev/null || true

          # ลบ Excel ออกจาก staging (ไม่ต้อง push Excel ขึ้น GitHub)
          git reset HEAD Gold_Momentum_v2.2.xlsx 2>/dev/null || true

          # เช็คว่ามีอะไรต้อง push ไหม
          if git diff --cached --quiet; then
            echo "✅ No changes to push"
          else
            # สร้าง commit message
            if [ -f PRICE_COMMIT_INFO ]; then
              PRICE_INFO=$(cat PRICE_COMMIT_INFO)
              git commit -m "🥇 Gold prices ${PRICE_INFO} + Momentum Score — ${TIMESTAMP}"
            else
              git commit -m "🎯 Gold Momentum Score update — ${TIMESTAMP}"
            fi
            git push
            echo "✅ Pushed to GitHub"
          fi

          # Cleanup temp files
          rm -f NO_NEW_DATA PRICE_COMMIT_INFO
